name: gaussian_splatting
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - cudatoolkit=11.6
  - plyfile
  - python=3.7.13
  - pip=22.3.1
  - pytorch=1.12.1
  - torchaudio=0.12.1
  - torchvision=0.13.1
  - tqdm
  - pip:
    - submodules/diff-gaussian-rasterization
    - submodules/simple-knn
    - submodules/fused-ssim
    - opencv-python
    - joblib
    - git+https://github.com/uncatchablealex/futhark-server-python.git@main
    - -e submodules/futhark-3dgs/futhark_3dgs
  - futhark:
    - cuda --server submodules/futhark-3dgs/futhark-rasterizer/rasterizer.fut